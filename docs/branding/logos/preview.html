<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade News Logo Options</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 { margin: 0 0 10px; }
    p { margin: 0 0 24px; }
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Trade News Logo Concepts</h1>
    <p>Choose one direction and I can refine color, typography, and icon geometry.</p>

    <div class="card">
      <div class="title">Option 1: Headline to Uptrend</div>
      <img src="trade-news-logo-option-1.svg" alt="Option 1 logo" />
    </div>

    <div class="card">
      <div class="title">Option 2: TN Monogram + Candles</div>
      <img src="trade-news-logo-option-2.svg" alt="Option 2 logo" />
      <div class="title" style="margin-top:14px;">Option 2 Refined: Primary Light</div>
      <img src="trade-news-logo-primary-light.svg" alt="Option 2 refined light logo" />
      <div class="title" style="margin-top:14px;">Option 2 Refined: Primary Dark</div>
      <div style="background:#0f172a; border-radius:10px; padding:8px; border:1px solid #1f2937;">
        <img src="trade-news-logo-primary-dark.svg" alt="Option 2 refined dark logo" />
      </div>
      <div class="title" style="margin-top:14px;">Option 2 Refined: Icon Mark</div>
      <div style="max-width:240px;">
        <img src="trade-news-icon-option-2.svg" alt="Option 2 icon" />
      </div>
    </div>

    <div class="card">
      <div class="title">Option 3: Signal Radar</div>
      <img src="trade-news-logo-option-3.svg" alt="Option 3 logo" />
    </div>
  </div>
</body>
</html>
