<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Trade News Logo Option 2</title>
  <desc id="desc">A monogram TN built from ticker candles and a news pulse ring, symbolizing market movement from information flow.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F4EE"/>
      <stop offset="100%" stop-color="#EDE7DB"/>
    </linearGradient>
    <linearGradient id="ink2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B2A4C"/>
      <stop offset="100%" stop-color="#1A6C7A"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="400" rx="34" fill="url(#bg2)"/>

  <g transform="translate(70,56)">
    <circle cx="144" cy="144" r="132" fill="none" stroke="#213547" stroke-width="16" opacity="0.2"/>
    <circle cx="144" cy="144" r="112" fill="#FFFFFF" stroke="#C8D2D9" stroke-width="2"/>

    <g transform="translate(66,76)" fill="url(#ink2)">
      <rect x="0" y="0" width="22" height="120" rx="6"/>
      <rect x="0" y="38" width="124" height="22" rx="6"/>
      <rect x="102" y="0" width="22" height="172" rx="6"/>
      <rect x="148" y="0" width="22" height="172" rx="6"/>
      <rect x="102" y="150" width="68" height="22" rx="6"/>
    </g>

    <g transform="translate(46,196)">
      <line x1="0" y1="32" x2="196" y2="32" stroke="#B9C6CD" stroke-width="2"/>
      <rect x="14" y="22" width="14" height="20" fill="#00A86B"/>
      <line x1="21" y1="12" x2="21" y2="50" stroke="#00A86B" stroke-width="3"/>
      <rect x="42" y="12" width="14" height="30" fill="#D1495B"/>
      <line x1="49" y1="4" x2="49" y2="52" stroke="#D1495B" stroke-width="3"/>
      <rect x="70" y="16" width="14" height="26" fill="#00A86B"/>
      <line x1="77" y1="8" x2="77" y2="52" stroke="#00A86B" stroke-width="3"/>
      <rect x="98" y="8" width="14" height="34" fill="#00A86B"/>
      <line x1="105" y1="0" x2="105" y2="52" stroke="#00A86B" stroke-width="3"/>
      <rect x="126" y="20" width="14" height="22" fill="#D1495B"/>
      <line x1="133" y1="12" x2="133" y2="52" stroke="#D1495B" stroke-width="3"/>
      <rect x="154" y="6" width="14" height="36" fill="#00A86B"/>
      <line x1="161" y1="0" x2="161" y2="52" stroke="#00A86B" stroke-width="3"/>
    </g>
  </g>

  <g transform="translate(380,110)">
    <text x="0" y="94" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-size="108" font-weight="700" letter-spacing="0.8" fill="#1F2A34">Trade News</text>
    <text x="4" y="146" font-family="Manrope, Segoe UI, Arial, sans-serif" font-size="30" font-weight="600" letter-spacing="3.2" fill="#2C6975">REAL-TIME MARKET NARRATIVE</text>
  </g>
